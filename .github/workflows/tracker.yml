name: Momo Tracker

on:
  schedule:
    - cron: "0 0 * * *"

  workflow_dispatch:

jobs:
  run:

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5

      with:

        python-version: "3.12"

    - run: pip install -r requirements.txt

    - run: python tracker.py

      env:

        EMAIL: ${{ secrets.EMAIL }}

        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}

        TO_EMAIL: ${{ secrets.TO_EMAIL }}
